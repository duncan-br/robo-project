[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=on_device_app.api
    --cov=on_device_app.dto
    --cov=on_device_app.config
    --cov=on_device_app.api_client
    --cov=on_device_app.services
    --cov=improved_pipelines.object_store
    --cov=improved_pipelines.review_queue
    --cov-report=term-missing
    --cov-report=html:reports/coverage_html
    --html=reports/test_report.html
    --self-contained-html
    --cov-fail-under=80
