stages:
  preload_embeddings:
    cmd: >
      python -m improved_pipelines.preload_embeddings
      --object-store data/object_store
      --chroma-path data/chroma_db
      --summary-out data/preload_run_summary.json
    deps:
      - improved_pipelines
      - detection/OWL_VIT_v2/image_conditioned.py
      - detection/OWL_VIT_v2/utils.py
      - requirements.txt
      - data/object_store/classes.txt
      - data/object_store/images
      - data/object_store/labels
    outs:
      - data/chroma_db
      - data/preload_run_summary.json

  validate_gold:
    cmd: >
      python -m improved_pipelines.validate_gold
      --object-store data/object_store
      --chroma-path data/chroma_db
      --report-out data/validation_report.json
    deps:
      - improved_pipelines
      - detection/OWL_VIT_v2/image_conditioned.py
      - detection/OWL_VIT_v2/utils.py
      - requirements.txt
      - data/chroma_db
      - data/object_store/classes.txt
      - data/object_store/images
      - data/object_store/labels
    outs:
      - data/validation_report.json
