name: open-robo-vision-mac

services:
  open-robo-vision:
    image: open-robo-vision:mac-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: cpu
    ports:
      - "6080:6080"
    environment:
      OWL_CHECKPOINT_PATH: ${OWL_CHECKPOINT_PATH:-/app/detection/OWL_VIT_v2/owl_vit/weights/owl2-b16-960-st-ngrams-curated-ft-lvisbase-ens-cold-weight-05/owl2-b16-960-st-ngrams-curated-ft-lvisbase-ens-cold-weight-05_209b65b}
      XLA_FLAGS: ${XLA_FLAGS:-}
    volumes:
      - .:/app
      - ${OWL_WEIGHTS_DIR:-./weights}:/weights/owl:ro
    stdin_open: true
    tty: true
